<style>
    /* ============================================================
   JustCook — Premium Shop Page
   ============================================================ */

    .jc-shop-header {
        padding: 6rem 0 4rem;
        text-align: center;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at 50% 0%, rgba(255, 90, 95, 0.05) 0%, transparent 70%);
    }

    .shop-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.1;
        z-index: -1;
    }

    .sb-1 {
        width: 400px;
        height: 400px;
        top: -100px;
        left: -100px;
        background: var(--primary);
    }

    .sb-2 {
        width: 300px;
        height: 300px;
        bottom: 0;
        right: -50px;
        background: #6366f1;
    }

    .shop-title {
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 900;
        margin-bottom: 1rem;
        letter-spacing: -0.03em;
    }

    .shop-subtitle {
        opacity: 0.5;
        max-width: 600px;
        margin: 0 auto 3rem;
        font-size: 1.1rem;
    }

    /* Search & Filters */
    .shop-controls {
        max-width: 1000px;
        margin: 0 auto 4rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
    }

    .search-wrap {
        width: 100%;
        max-width: 500px;
        position: relative;
    }

    .search-input {
        width: 100%;
        padding: 1.2rem 1.5rem 1.2rem 3.5rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text);
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    }

    .search-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 15px 40px rgba(255, 90, 95, 0.1);
    }

    .search-icon {
        position: absolute;
        left: 1.2rem;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.4;
    }

    .filter-chips {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
        justify-content: center;
    }

    .chip {
        padding: 0.6rem 1.5rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 99px;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        color: var(--text);
    }

    .chip:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
    }

    .chip.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: 0 8px 20px rgba(230, 57, 70, 0.3);
    }

    /* Product Grid */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2.5rem;
        padding-bottom: 8rem;
    }

    .p-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 32px;
        overflow: hidden;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        display: flex;
        flex-direction: column;
    }

    .p-card:hover {
        transform: translateY(-15px);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        border-color: var(--primary);
    }

    .p-img-wrap {
        height: 280px;
        overflow: hidden;
        position: relative;
        background: #f8fafc;
    }

    .p-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .p-card:hover .p-img {
        transform: scale(1.1);
    }

    .p-badge {
        position: absolute;
        top: 1.2rem;
        right: 1.2rem;
        padding: 0.4rem 1rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
        border-radius: 99px;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--primary);
        z-index: 2;
    }

    .p-body {
        padding: 2rem;
        flex: 1;
        display: flex;
        flex-direction: column;
        text-align: center;
    }

    .p-cat {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        opacity: 0.4;
        letter-spacing: 1.5px;
        margin-bottom: 0.5rem;
    }

    .p-name {
        font-size: 1.25rem;
        font-weight: 800;
        margin-bottom: 1rem;
        line-height: 1.2;
    }

    .p-price {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--primary);
        margin-top: auto;
    }

    .p-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 2rem;
        background: linear-gradient(to top, var(--card), transparent);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s;
        display: flex;
        justify-content: center;
    }

    .p-card:hover .p-overlay {
        opacity: 1;
        transform: translateY(0);
    }

    .add-btn {
        width: 100%;
        padding: 1rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 18px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        transition: all 0.3s;
    }

    .add-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(230, 57, 70, 0.4);
    }

    @media (max-width: 768px) {
        .p-overlay {
            position: static;
            opacity: 1;
            transform: none;
            background: none;
            padding-top: 1.5rem;
        }

        .p-card {
            border-radius: 24px;
        }
    }
</style>

<div class="jc-shop-page">
    <div class="shop-blob sb-1"></div>
    <div class="shop-blob sb-2"></div>

    <section class="jc-shop-header container">
        <h1 class="shop-title" data-aos="zoom-out">Flavor Gallery</h1>
        <p class="shop-subtitle" data-aos="fade-up" data-aos-delay="100">
            Explore our curated collection of authentic food mixes. Bringing restaurant-grade flavors straight to your
            kitchen.
        </p>

        <div class="shop-controls" data-aos="fade-up" data-aos-delay="200">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="shop-search" class="search-input" placeholder="Search flavors...">
            </div>

            <div class="filter-chips" id="category-filters">
                <button class="chip active" data-cat="all">All Items</button>
                <button class="chip" data-cat="Pani Puri">Pani Puri</button>
                <button class="chip" data-cat="Ready Mix">Ready Mixes</button>
                <button class="chip" data-cat="Snacks">Snacks</button>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="products-grid" id="shop-grid">
            <!-- Products will be injected here -->
        </div>
    </div>
</div>

<script>
    (function shopPage() {
        const grid = document.getElementById('shop-grid');
        const searchInp = document.getElementById('shop-search');
        const filterContainer = document.getElementById('category-filters');
        const chips = filterContainer.querySelectorAll('.chip');

        let allProducts = [];
        let currentCat = 'all';
        let searchQuery = '';

        async function initShop() {
            if (!window.Database) return;

            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:5rem; opacity:0.5;">Loading flavors...</div>';

            allProducts = await window.Database.getProducts();
            render();

            searchInp.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                render();
            });

            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    chips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    currentCat = chip.dataset.cat;
                    render();
                });
            });
        }

        function render() {
            const filtered = allProducts.filter(p => {
                const matchesCat = currentCat === 'all' || p.category === currentCat;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery) ||
                    p.description.toLowerCase().includes(searchQuery);
                return matchesCat && matchesSearch;
            });

            let html = '';
            filtered.forEach((p, i) => {
                const soonBadge = p.isComingSoon ? '<span class="p-badge" style="background:#facc15; color:#000;">Soon</span>' : '';
                const featBadge = p.isFeatured ? '<span class="p-badge" style="right:auto; left:1.2rem;">Featured</span>' : '';
                const price = Number(p.price).toFixed(2);
                
                html += '<div class="p-card" data-aos="fade-up" data-aos-delay="' + (i * 50) + '">'
                     + '<a href="#/product/' + p.id + '" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%;">'
                     + '<div class="p-img-wrap">'
                     + soonBadge + featBadge
                     + '<img src="' + p.imageUrl + '" class="p-img" alt="' + p.name + '" onerror="this.src=\'images/logo.png\'">'
                     + '</div>'
                     + '<div class="p-body">'
                     + '<span class="p-cat">' + p.category + '</span>'
                     + '<h3 class="p-name">' + p.name + '</h3>'
                     + '<div class="p-price">₹' + price + '</div>'
                     + '</div>'
                     + '</a>'
                     + '<div class="p-overlay">'
                     + '<button class="add-btn" onclick="addToCart(event, \'' + p.id + '\')">'
                     + (p.isComingSoon ? 'Notify Me' : 'Add to Cart')
                     + '</button>'
                     + '</div>'
                     + '</div>';
            });
            grid.innerHTML = html;
        }

        // Global helper for add to cart
        window.addToCart = (e, id) => {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;

            if (p.isComingSoon) {
                window.showToast('We will notify you when back in stock!', 'ok');
                return;
            }

            if (window.Store) {
                // Map product fields to what Store.addToCart expects
                window.Store.addToCart({
                    productId: p.id,
                    variantId: p.id,
                    name: p.name,
                    price: Number(p.price) || 0,
                    qty: 1,
                    imageUrl: p.imageUrl || 'images/logo.png',
                    category: p.category
                });
                window.showToast(`${p.name} added to cart!`);

                const btn = e.currentTarget || e.target;
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = '', 150);
            }
        };

        // Continue Shopping link
        window.goShop = () => { window.location.hash = '#/products'; };

        initShop();
    })();
</script>
