<style>
/* ===== My Orders Page ===== */
.orders-page { padding: 6rem 0 10rem; position: relative; }
.orders-title { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; margin-bottom: 1.5rem; text-align: center; letter-spacing: -0.03em; }
.orders-subtitle { text-align: center; opacity: 0.5; margin-bottom: 4rem; font-size: 1.1rem; }

.orders-container { max-width: 900px; margin: 0 auto; }

/* Filter / Search Box */
.orders-search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 2.5rem;
    margin-bottom: 4rem;
    box-shadow: 0 20px 40px rgba(0,0,0,0.04);
    text-align: center;
}
.orders-search-box h3 { margin-bottom: 1.5rem; font-size: 1.3rem; }
.os-input-group { display: flex; gap: 1rem; max-width: 500px; margin: 0 auto; }
.os-input {
    flex: 1; padding: 1rem 1.5rem;
    background: var(--bg); border: 2px solid var(--border);
    border-radius: 20px; color: var(--text);
    font-size: 1rem; font-weight: 600;
    transition: all 0.3s;
}
.os-input:focus { outline: none; border-color: var(--primary); }
.os-btn {
    background: var(--primary); color: white;
    border: none; border-radius: 20px;
    padding: 0 2rem; font-weight: 800;
    cursor: pointer; transition: transform 0.3s;
}
.os-btn:hover { transform: translateY(-2px); }

/* Order Cards */
.order-list { display: grid; gap: 2rem; }
.order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 2rem;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 2rem;
}
.order-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

.order-info h4 { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.8rem; }
.order-info p { opacity: 0.5; font-size: 0.9rem; margin-bottom: 1rem; }
.order-items-preview { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.order-item-chip {
    padding: 0.4rem 0.8rem; background: var(--bg);
    border-radius: 99px; font-size: 0.75rem; font-weight: 700; border: 1px solid var(--border);
}

.order-status { text-align: right; }
.os-price { font-size: 1.5rem; font-weight: 900; color: var(--primary); margin-bottom: 0.8rem; }
.os-badge {
    display: inline-block; padding: 0.5rem 1.2rem;
    border-radius: 99px; font-size: 0.8rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
}

.status-Confirmed { background: rgba(99,102,241,0.1); color: #6366f1; }
.status-Delivered { background: rgba(34,197,94,0.1); color: #22c55e; }
.status-Processing { background: rgba(250,204,21,0.1); color: #eab308; }

.empty-state { text-align: center; padding: 6rem 2rem; opacity: 0.5; }
.empty-state i { font-size: 4rem; margin-bottom: 1.5rem; display: block; }

@media (max-width: 600px) {
    .order-card { grid-template-columns: 1fr; text-align: center; }
    .order-status { text-align: center; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    .os-input-group { flex-direction: column; }
}
</style>

<div class="orders-page container" id="orders-root">
    <h1 class="orders-title" data-aos="zoom-out">Order History</h1>
    <p class="orders-subtitle" data-aos="fade-up" data-aos-delay="100">Review your past purchases and track current deliveries.</p>

    <div class="orders-container">
        <!-- Search Box -->
        <div class="orders-search-box" data-aos="fade-up" data-aos-delay="200">
            <h3>Find your orders</h3>
            <div class="os-input-group">
                <input type="tel" id="orders-phone" class="os-input" placeholder="Enter Mobile Number (10 digits)" maxlength="10">
                <button class="os-btn" id="btn-find-orders">Search</button>
            </div>
            <p style="font-size: 0.8rem; opacity: 0.4; margin-top: 1rem;">We'll list all orders associated with this number.</p>
        </div>

        <!-- Orders List -->
        <div class="order-list" id="order-list-area">
            <!-- Dynamically loaded -->
            <div class="empty-state">
                <i class="fas fa-shopping-bag"></i>
                <p>Enter your phone number to see your orders.</p>
            </div>
        </div>
    </div>
</div>

<script>
(function ordersPage() {
    const root = document.getElementById('orders-root');
    const phoneInput = document.getElementById('orders-phone');
    const findBtn = document.getElementById('btn-find-orders');
    const listArea = document.getElementById('order-list-area');

    if (!window.Database) return;

    // Check if logged in
    const currentUser = window.Store.getState().user;
    if (currentUser) {
        document.querySelector('.orders-search-box').style.display = 'none';
        loadOrdersByEmail(currentUser.email);
    } else {
        // Check if phone was recently searched
        const lastPhone = localStorage.getItem('jc_last_searched_phone');
        if (lastPhone) {
            phoneInput.value = lastPhone;
            loadOrdersByPhone(lastPhone);
        }
    }

    findBtn.addEventListener('click', () => {
        const phone = phoneInput.value.trim();
        if (!/^\d{10}$/.test(phone)) {
            return window.showToast('Please enter a valid 10-digit mobile number.', 'err');
        }
        localStorage.setItem('jc_last_searched_phone', phone);
        loadOrdersByPhone(phone);
    });

    async function loadOrdersByEmail(email) {
        listArea.innerHTML = '<div style="text-align:center; padding:4rem; opacity:0.5;">Loading your orders...</div>';
        try {
            const orders = await window.Database.getMyOrders();
            handleOrderResults(orders);
        } catch (e) {
            listArea.innerHTML = '<div style="text-align:center; padding:4rem; color:#ef4444;">Error loading orders.</div>';
        }
    }

    async function loadOrdersByPhone(phone) {
        listArea.innerHTML = '<div style="text-align:center; padding:4rem; opacity:0.5;">Fetching your orders...</div>';
        try {
            const orders = await window.Database.getOrdersByPhone(phone);
            handleOrderResults(orders);
        } catch (e) {
            listArea.innerHTML = '<div style="text-align:center; padding:4rem; color:#ef4444;">Error loading orders.</div>';
        }
    }

    function handleOrderResults(orders) {
        if (!orders || orders.length === 0) {
            listArea.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>No orders found.</p>
                    <a href="#/products" class="btn" style="margin-top:2rem;">Start Shopping</a>
                </div>
            `;
            return;
        }
        renderOrders(orders);
    }

    function renderOrders(orders) {
        listArea.innerHTML = orders.map((o, i) => {
            const date = new Date(o.createdAt).toLocaleDateString('en-IN', {
                day: 'numeric', month: 'short', year: 'numeric'
            });
            const status = o.status || 'Confirmed';
            const itemsPreview = (o.items || []).slice(0, 3).map(it => 
                `<span class="order-item-chip">${it.qty}x ${it.name}</span>`
            ).join('');
            const moreItems = o.items.length > 3 ? `<span class="order-item-chip">+${o.items.length - 3} more</span>` : '';

            return `
                <div class="order-card" data-aos="fade-up" data-aos-delay="${i * 50}">
                    <div class="order-info">
                        <h4>#${o.id} <span style="font-size:0.8rem; font-weight:400; opacity:0.4;">| ${date}</span></h4>
                        <p>${o.customer.address}, ${o.customer.city}</p>
                        <div class="order-items-preview">
                            ${itemsPreview}
                            ${moreItems}
                        </div>
                        <div style="margin-top:1.5rem;">
                            <a href="#/tracker?id=${o.id}" class="btn btn-outline" style="padding:0.6rem 1.2rem; font-size:0.8rem;">Track Details</a>
                        </div>
                    </div>
                    <div class="order-status">
                        <div class="os-price">₹${o.total.toFixed(2)}</div>
                        <div class="os-badge status-${status.replace(/\s+/g, '')}">${status}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Auto-search if ID is in URL (maybe from checkout)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('phone')) {
        const p = urlParams.get('phone');
        phoneInput.value = p;
        loadOrders(p);
    }

})();
</script>
